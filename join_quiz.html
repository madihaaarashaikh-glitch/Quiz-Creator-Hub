<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Quiz</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 15px 0;
    border-radius: 8px;
    border: none;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #a855f7;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Join Quiz 🎯</h2>

    <input type="text" placeholder="Enter Quiz Code">

    <button class="btn">Start Quiz</button>
</div>

</body>
</html>
