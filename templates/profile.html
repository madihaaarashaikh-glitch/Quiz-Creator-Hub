<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizHub - Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#070414,#140b2c,#1b1140);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* BACKGROUND */
.circle{
position:absolute;
border-radius:50%;
filter:blur(90px);
z-index:-1;
opacity:0.6;
animation:float 8s infinite ease-in-out;
}

.circle1{
width:320px;height:320px;
background:#9333ea;
top:-120px;left:-100px;
}

.circle2{
width:280px;height:280px;
background:#3b82f6;
bottom:-120px;right:-100px;
}

@keyframes float{
50%{transform:translateY(30px);}
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:30px;
font-weight:800;
background:linear-gradient(90deg,#c084fc,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav a{
color:#ddd;
margin-left:15px;
text-decoration:none;
}

.nav a:hover{
color:#a855f7;
}

/* MAIN */
.container{
max-width:1100px;
margin:40px auto;
padding:20px;
}

/* PROFILE CARD */
.profile-card{
display:flex;
align-items:center;
gap:25px;
padding:30px;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(18px);
border-radius:25px;
border:1px solid rgba(255,255,255,0.1);
position:relative;
overflow:hidden;
}

.profile-card::before{
content:"";
position:absolute;
width:200px;
height:200px;
background:rgba(168,85,247,0.2);
border-radius:50%;
top:-60px;
right:-60px;
filter:blur(40px);
}

.profile-img{
width:100px;
height:100px;
border-radius:50%;
border:3px solid #a855f7;
}

.profile-info h2{
font-size:26px;
margin-bottom:5px;
}

.profile-info p{
color:#bbb;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.stat-card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:20px;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.stat-card:hover{
transform:translateY(-8px);
box-shadow:0 0 30px rgba(168,85,247,0.3);
}

.stat-card h3{
font-size:28px;
color:#a855f7;
}

/* BUTTONS */
.actions{
display:flex;
gap:15px;
margin-top:30px;
flex-wrap:wrap;
}

.btn{
padding:14px 25px;
border-radius:15px;
text-decoration:none;
font-weight:600;
color:white;
transition:0.3s;
}

.edit{
background:linear-gradient(135deg,#9333ea,#7c3aed);
}

.logout{
background:linear-gradient(135deg,#ec4899,#db2777);
}

.btn:hover{
transform:translateY(-4px);
}

</style>
</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<!-- NAV -->
<nav>
<div class="logo">🧠 QuizHub</div>

<div class="nav">
<a href="/home">Home</a>
<a href="/create">Create</a>
<a href="/profile">Profile</a>
</div>
</nav>

<!-- PROFILE -->
<div class="container">

<div class="profile-card">

<img class="profile-img" src="{{ profile_pic if profile_pic else 'https://i.imgur.com/0y0y0y0.png' }}">

<div class="profile-info">
<h2>👋 {{ name }}</h2>
<p>📧 {{ email }}</p>
<p>🚀 QuizHub Premium User</p>
</div>

</div>

<!-- STATS -->
<div class="stats">

<div class="stat-card">
<h3>{{ quiz_count }}</h3>
<p>Total Quizzes</p>
</div>

<div class="stat-card">
<h3>{{ attempt_count }}</h3>
<p>Total Attempts</p>
</div>

<div class="stat-card">
<h3>{{ accuracy }}%</h3>
<p>Accuracy</p>
</div>

<div class="stat-card">
<h3>PRO</h3>
<p>Status</p>
</div>

</div>

<!-- ACTIONS -->
<div class="actions">
<a href="/edit_profile" class="btn edit">✏️ Edit Profile</a>
<a href="/logout" class="btn logout">🚪 Logout</a>
</div>

</div>

</body>
</html>
