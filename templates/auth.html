<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuizHub Auth</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

background:
linear-gradient(
135deg,
#0f0c29,
#302b63,
#24243e
);

position:relative;

}

/* BACKGROUND */

.bg{

position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;

}

.circle{

position:absolute;
border-radius:50%;
filter:blur(80px);
animation:float 8s infinite ease-in-out;

}

.circle1{

width:320px;
height:320px;

background:#9333ea;

top:-100px;
left:-100px;

opacity:0.5;

}

.circle2{

width:260px;
height:260px;

background:#3b82f6;

bottom:-80px;
right:-70px;

opacity:0.4;

animation-delay:2s;

}

.circle3{

width:220px;
height:220px;

background:#ec4899;

top:50%;
left:60%;

opacity:0.3;

animation-delay:4s;

}

@keyframes float{

50%{
transform:
translateY(30px)
translateX(15px);
}

}

/* CONTAINER */

.auth-container{

position:relative;
z-index:10;

width:100%;
max-width:430px;

background:
rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

padding:40px;

border-radius:30px;

box-shadow:
0 0 40px rgba(168,85,247,0.25);

border:
1px solid rgba(255,255,255,0.1);

animation:fadeIn 1s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* LOGO */

.logo{

text-align:center;
font-size:45px;
font-weight:700;

margin-bottom:10px;

background:
linear-gradient(
90deg,
#a855f7,
#ec4899
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* SUBTITLE */

.subtitle{

text-align:center;
color:#d1d5db;
margin-bottom:30px;
line-height:1.7;

}

/* MESSAGE */

.msg{

text-align:center;
margin-bottom:18px;
color:#facc15;
font-weight:500;

}

/* INPUT */

.input-box{

margin-bottom:18px;

}

.input-box input{

width:100%;

padding:15px 18px;

border:none;
outline:none;

border-radius:16px;

background:
rgba(255,255,255,0.08);

color:white;

font-size:15px;

transition:0.3s;

}

.input-box input::placeholder{

color:#ccc;

}

.input-box input:focus{

border:
1px solid #a855f7;

box-shadow:
0 0 15px rgba(168,85,247,0.6);

background:
rgba(255,255,255,0.12);

}

/* BUTTON */

.auth-btn{

width:100%;

padding:15px;

border:none;

border-radius:16px;

background:
linear-gradient(
135deg,
#9333ea,
#7c3aed
);

color:white;

font-size:17px;
font-weight:600;

cursor:pointer;

transition:0.3s;

box-shadow:
0 0 20px rgba(168,85,247,0.4);

}

.auth-btn:hover{

transform:translateY(-3px);

box-shadow:
0 0 30px rgba(168,85,247,0.8);

}

/* SWITCH */

.switch{

text-align:center;
margin-top:22px;

color:#d1d5db;

font-size:15px;

}

.switch span{

color:#c084fc;
font-weight:600;
cursor:pointer;

}

/* HIDE */

.hidden{

display:none;

}

/* MOBILE */

@media(max-width:500px){

.auth-container{

margin:20px;
padding:30px 22px;

}

.logo{

font-size:38px;

}

.subtitle{

font-size:14px;

}

}

</style>

<script>

function showRegister(){

document.getElementById(
"loginForm"
).classList.add("hidden");

document.getElementById(
"registerForm"
).classList.remove("hidden");

}

function showLogin(){

document.getElementById(
"registerForm"
).classList.add("hidden");

document.getElementById(
"loginForm"
).classList.remove("hidden");

}

</script>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg">

<div class="circle circle1"></div>

<div class="circle circle2"></div>

<div class="circle circle3"></div>

</div>

<!-- AUTH BOX -->

<div class="auth-container">

<div class="logo">
🧠 QuizHub
</div>

<p class="subtitle">

Smart online examination platform with
live quiz system, rankings, analytics
and modern dashboard.

</p>

<p class="msg">
{{ msg }}
</p>

<!-- LOGIN -->

<form id="loginForm"
method="POST">

<h2 style="
text-align:center;
margin-bottom:25px;
font-weight:600;
">

Login

</h2>

<input type="hidden"
name="form_type"
value="login">

<div class="input-box">

<input type="email"
name="email"
placeholder="Enter Email"
required>

</div>

<div class="input-box">

<input type="password"
name="password"
placeholder="Enter Password"
required>

</div>

<button class="auth-btn">

🔐 Login

</button>

<div class="switch">

New user?

<span onclick="showRegister()">

Create Account

</span>

</div>

</form>

<!-- REGISTER -->

<form id="registerForm"
method="POST"
class="hidden">

<h2 style="
text-align:center;
margin-bottom:25px;
font-weight:600;
">

Register

</h2>

<input type="hidden"
name="form_type"
value="register">

<div class="input-box">

<input type="text"
name="name"
placeholder="Enter Full Name"
required>

</div>

<div class="input-box">

<input type="email"
name="email"
placeholder="Enter Email"
required>

</div>

<div class="input-box">

<input type="password"
name="password"
placeholder="Create Password"
required>

</div>

<button class="auth-btn">

🚀 Register

</button>

<div class="switch">

Already have account?

<span onclick="showLogin()">

Login

</span>

</div>

</form>

</div>

</body>

</html>
